<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Flow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Time Flow</h1>
        <div id="datetime" class="datetime"></div>
    </header>

    <main>
        <section class="timer-section">
            <div class="session-info">
                <span id="session-type" class="session-type">Work</span>
                <span id="session-count" class="session-count">Session 1 of 4</span>
            </div>
            
            <div class="timer-display">
                <span id="timer" class="timer">25:00</span>
            </div>

            <div class="controls">
                <button id="start-btn" class="btn btn-primary" aria-label="Start timer">Start</button>
                <button id="pause-btn" class="btn btn-secondary" aria-label="Pause timer" disabled>Pause</button>
                <button id="reset-btn" class="btn btn-tertiary" aria-label="Reset timer">Reset</button>
            </div>
        </section>

        <section class="settings-section">
            <h2>Settings</h2>
            <div class="settings-grid">
                <div class="setting-item">
                    <label for="work-duration">Work Duration (minutes)</label>
                    <input type="number" id="work-duration" min="1" max="60" value="25">
                </div>
                <div class="setting-item">
                    <label for="short-break">Short Break (minutes)</label>
                    <input type="number" id="short-break" min="1" max="30" value="5">
                </div>
                <div class="setting-item">
                    <label for="long-break">Long Break (minutes)</label>
                    <input type="number" id="long-break" min="1" max="60" value="15">
                </div>
                <div class="setting-item">
                    <label for="sessions-until-long">Sessions Until Long Break</label>
                    <input type="number" id="sessions-until-long" min="2" max="10" value="4">
                </div>
            </div>
            <button id="apply-settings" class="btn btn-apply">Apply Settings</button>
        </section>
    </main>

    <footer>
        <p>Stay focused and productive</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
